# Genome configuration defaults (Tier A — v0.1.0)
#
# Children customize behavior by placing a `genome.config.yaml` at their project
# root; its values shallow-merge OVER these defaults (child wins). This lets a
# child tune the genome WITHOUT editing genome code — the ②기둥 (clean boundary)
# that makes children safe across genome upgrades.
#
# Do not edit this file in a child. Edit your own root genome.config.yaml.

# --- Translation leg ---------------------------------------------------------
# Governs the translator agent + glossary + validate_translation hook + the
# AGENTS §5.2/§5.4/§8 translation rules. Enable ONLY for children whose
# deliverable is an EN/KO pair. Single-language or code-centric children keep
# this false (e.g. frar = Korean-only output).
translation:
  enabled: false

# --- Secret detection (output_secret_filter) ---------------------------------
# The genome ships a built-in pattern set. Children may APPEND domain patterns
# (never remove the built-ins).
secrets:
  extra_patterns: []        # list of regex strings, appended to genome built-ins

# --- Quality gates (L0–L2 / pACS) --------------------------------------------
# Children may TIGHTEN (raise) the floor, never loosen below the genome floor.
quality_gates:
  pacs_min: 70              # GREEN floor (genome floor; child may raise only)

# --- Destructive-command guard (block_destructive_commands) ------------------
# Children may add allowlist entries for domain-legitimate commands.
destructive_guard:
  extra_allow: []           # list of exact command prefixes to allow
